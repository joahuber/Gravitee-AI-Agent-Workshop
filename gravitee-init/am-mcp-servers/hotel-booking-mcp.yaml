# Hotel Booking MCP Server Configuration
# This defines an MCP (Model Context Protocol) Server as a Protected Resource in AM

name: "Hotel Booking"
description: "MCP Server for hotel booking operations"
type: "MCP_SERVER"

# Resource Identifier (the URL of the MCP server)
resourceIdentifiers:
  - "http://localhost:8082/hotels/mcp"

# OAuth2 Client Credentials for the MCP Server
clientId: "hotel-mcp"
clientSecret: "hotel-mcp"

# MCP Tools (features) exposed by this server
tools:
  - key: "searchHotels"
    description: "Search and filter hotels across all cities."
    type: "MCP_TOOL"
    scopes: []

  - key: "listBookings"
    description: "Returns a list of bookings."
    type: "MCP_TOOL"
    scopes: []

  - key: "createBooking"
    description: "Create a new hotel booking."
    type: "MCP_TOOL"
    scopes: []
