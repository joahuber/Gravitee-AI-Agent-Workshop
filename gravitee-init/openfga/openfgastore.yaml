name: Hotel Booking Authorization Model
model: |+
  model
    schema 1.1

  type user

  type agent

  type system
    relations
      define accounting: [user]
      define controlling: [user]
      define booking_creator: [agent with within_price_limit]

  type hotel
    relations
      define admin: [user, hotel#admin]
      define guest: [user, hotel#guest]

  type room
    relations
      define can_book: [user] or guest from hotel or admin from hotel
      define hotel: [hotel]

  type booking
    relations
      define can_cancel: owner or admin from hotel
      define can_modify: owner or admin from hotel
      define can_view: owner or admin from hotel or accounting from system
      define hotel: [hotel]
      define owner: [user, hotel#guest]
      define room: [room]
      define system: [system]

# ABAC conditions (injected into the authorization model). within_price_limit is
# used by system.booking_creator: the booking price is supplied at check time and
# compared against the limit stored in the relationship tuple's context.
conditions:
  within_price_limit:
    name: within_price_limit
    expression: "price <= limit"
    parameters:
      price:
        type_name: TYPE_NAME_DOUBLE
      limit:
        type_name: TYPE_NAME_DOUBLE

tuples:
  # --- Agent spending limit (ABAC) ---
  # The AI agent may create bookings only up to a price limit. The limit lives in
  # this tuple's condition context; the backend passes the booking price at check
  # time and OpenFGA evaluates within_price_limit (price <= limit). Change the
  # limit here (or per agent) without touching code.
  - user: agent:hotel-ai-agent
    relation: booking_creator
    object: system:acme
    condition:
      name: within_price_limit
      context:
        limit: 3000.0

  # --- Accounting role ---
  # The accountant can read EVERY booking (can_view via accounting from system)
  # but cannot modify any booking unless they own it (can_modify/can_cancel stay
  # owner-or-admin). Bookings are linked to the singleton system:acme below.
  - user: user:mike.ross@littwheelerwilliamsbennett.com
    relation: accounting
    object: system:acme

  # --- Controlling role ---
  # Harvey Specter holds the controlling role and may call the auditReport endpoint,
  # which lists agent-created bookings priced above the spending limit.
  - user: user:harvey.specter@littwheelerwilliamsbennett.com
    relation: controlling
    object: system:acme

  # --- Booking ↔ System relationships (so accounting can_view resolves) ---
  - user: system:acme
    relation: system
    object: booking:BK-0001
  - user: system:acme
    relation: system
    object: booking:BK-0002
  - user: system:acme
    relation: system
    object: booking:BK-0003
  - user: system:acme
    relation: system
    object: booking:BK-0004
  - user: system:acme
    relation: system
    object: booking:BK-0005
  - user: system:acme
    relation: system
    object: booking:BK-0006
  - user: system:acme
    relation: system
    object: booking:BK-0007
  - user: system:acme
    relation: system
    object: booking:BK-0008
  # BK-0009 / BK-0010 are agent-created, over-limit bookings (audit targets)
  - user: system:acme
    relation: system
    object: booking:BK-0009
  - user: system:acme
    relation: system
    object: booking:BK-0010

  # --- Hotel guest relationships ---
  - user: user:louis.litt@littwheelerwilliamsbennett.com
    relation: guest
    object: hotel:grand-london
  - user: user:louis.litt@littwheelerwilliamsbennett.com
    relation: guest
    object: hotel:chateau-paris
  # Note: louis.litt is NOT a guest at imperial-tokyo → BK-0005 won't pass can_view

  # --- Booking ↔ Hotel relationships ---
  - user: hotel:grand-london
    relation: hotel
    object: booking:BK-0001
  - user: hotel:chateau-paris
    relation: hotel
    object: booking:BK-0002
  - user: hotel:imperial-tokyo
    relation: hotel
    object: booking:BK-0005

  # --- Booking ownership ---
  - user: user:louis.litt@littwheelerwilliamsbennett.com
    relation: owner
    object: booking:BK-0001
  - user: user:louis.litt@littwheelerwilliamsbennett.com
    relation: owner
    object: booking:BK-0002
  # BK-0005 has no owner tuple for louis.litt → FGA will deny can_view
